<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C1GGUN Movies</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #141414;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 18px 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      transition: background 0.3s;
    }

    nav.scrolled {
      background: #141414;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      color: #E50914;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 85vh;
      min-height: 500px;
      display: flex;
      align-items: flex-end;
      padding-bottom: 80px;
      overflow: hidden;
    }

    .hero-backdrop {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      filter: brightness(0.55);
      transition: background-image 0.6s ease;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        #141414 0%,
        rgba(20,20,20,0.4) 50%,
        transparent 100%
      );
    }

    .hero-content {
      position: relative;
      padding-left: 48px;
      max-width: 600px;
    }

    .hero-title {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
      margin-bottom: 16px;
    }

    .hero-rating {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }

    .star {
      color: #f5c518;
      font-size: 16px;
    }

    /* MOVIES SECTION */
    .section {
      padding: 0 48px 60px;
      margin-top: -40px;
      position: relative;
      z-index: 10;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #e5e5e5;
      letter-spacing: 0.5px;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .movie-card {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, z-index 0s 0.3s;
      background: #2a2a2a;
    }

    .movie-card:hover {
      transform: scale(1.08);
      z-index: 20;
      transition: transform 0.3s ease, z-index 0s 0s;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }

    .no-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #333;
      color: #777;
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .movie-card:hover .movie-info {
      transform: translateY(0);
    }

    .movie-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
    }

    .movie-score {
      margin-top: 5px;
      font-size: 11px;
      color: #46d369;
      font-weight: 700;
    }

    .movie-meta {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .movie-date {
      font-size: 10px;
      color: #bbb;
    }

    .movie-rating {
      font-size: 10px;
      color: #f5c518;
      font-weight: 700;
    }

    /* TITLE BELOW CARD (always visible) */
    .movie-label {
      padding: 8px 6px 6px;
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    .skeleton-card {
      border-radius: 6px;
      overflow: hidden;
    }

    .skeleton-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
    }

    .skeleton-label {
      height: 14px;
      margin: 8px 6px 10px;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* LOADER */
    .loader {
      display: flex;
      justify-content: center;
      padding: 60px;
      font-size: 15px;
      color: #777;
    }

    /* ERROR */
    .error-msg {
      text-align: center;
      padding: 60px;
      color: #E50914;
      font-size: 16px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 12px;
      border-top: 1px solid #222;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .hero-content { padding-left: 20px; }
      .hero-title { font-size: 32px; }
      .section { padding: 0 20px 40px; }
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <div class="logo">C1GGUN</div>
  </nav>

  <!-- HERO BANNER -->
  <section class="hero" id="hero">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content" id="heroContent">
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-rating" id="heroRating"></div>
    </div>
  </section>

  <!-- MOVIES GRID -->
  <section class="section">
    <div class="section-title">현재 상영 중인 영화</div>
    <div class="movies-grid" id="moviesGrid"></div>
  </section>

  <footer>
    <p>Powered by TMDB &nbsp;|&nbsp; C1GGUN Movies © 2025</p>
  </footer>

  <script>
    const API_KEY  = '4a0d668397fd334f9ec6ac0360bf0951';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p';

    // ── 스크롤 시 네비 배경 전환 ──────────────────────────────
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
    });

    // ── 스켈레톤 렌더링 ──────────────────────────────────────
    function renderSkeletons(count = 20) {
      const grid = document.getElementById('moviesGrid');
      grid.innerHTML = Array.from({ length: count }, () => `
        <div class="skeleton-card">
          <div class="skeleton skeleton-poster"></div>
          <div class="skeleton skeleton-label"></div>
        </div>
      `).join('');
    }

    // ── 히어로 배너 세팅 ─────────────────────────────────────
    function setHero(movie) {
      const backdrop = movie.backdrop_path
        ? `${IMG_BASE}/original${movie.backdrop_path}`
        : (movie.poster_path ? `${IMG_BASE}/original${movie.poster_path}` : '');

      if (backdrop) {
        document.getElementById('heroBackdrop').style.backgroundImage = `url('${backdrop}')`;
      }

      document.getElementById('heroTitle').textContent =
        movie.title || movie.original_title || '';

      const score = movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A';
      document.getElementById('heroRating').innerHTML =
        `<span class="star">★</span> ${score} / 10`;
    }

    // ── 영화 카드 렌더링 ─────────────────────────────────────
    function renderMovies(movies) {
      const grid = document.getElementById('moviesGrid');
      grid.innerHTML = movies.map(movie => {
        const poster = movie.poster_path
          ? `<img class="movie-poster" src="${IMG_BASE}/w342${movie.poster_path}"
               alt="${movie.title}" loading="lazy" />`
          : `<div class="no-poster">포스터 없음</div>`;

        const score = movie.vote_average ? Math.round(movie.vote_average * 10) + '%' : '';
        const rating = movie.vote_average ? movie.vote_average.toFixed(1) : null;
        const title = movie.title || movie.original_title || '제목 없음';
        const releaseDate = movie.release_date
          ? movie.release_date.replace(/-/g, '.')
          : null;

        return `
          <div class="movie-card">
            ${poster}
            <div class="movie-info">
              <div class="movie-title">${title}</div>
              ${score ? `<div class="movie-score">일치율 ${score}</div>` : ''}
              <div class="movie-meta">
                ${releaseDate ? `<span class="movie-date">📅 ${releaseDate}</span>` : ''}
                ${rating ? `<span class="movie-rating">★ ${rating}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="movie-label" title="${title}">${title}</div>
        `;
      }).join('');
    }

    // ── 데이터 페치 ──────────────────────────────────────────
    async function fetchNowPlaying() {
      renderSkeletons(20);

      try {
        const res = await fetch(
          `${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=ko-KR&region=KR&page=1`
        );

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const movies = data.results || [];

        if (movies.length === 0) throw new Error('영화 데이터가 없습니다.');

        // 첫 번째 영화를 히어로 배너로
        setHero(movies[0]);
        renderMovies(movies);

      } catch (err) {
        console.error(err);
        document.getElementById('moviesGrid').innerHTML =
          `<div class="error-msg" style="grid-column:1/-1">
            영화를 불러오지 못했습니다.<br><small>${err.message}</small>
          </div>`;
      }
    }

    fetchNowPlaying();
  </script>
</body>
</html>
